# Local dev stack for Kahaniverse.
#
# Host ports use a 5x/8x range to avoid clashing with other projects:
#   - Postgres 16        (host 55432 → container 5432)
#   - Neon HTTP proxy    (host  4455 → container 4444)
#   - Redis 7            (host 56379 → container 6379)
#   - Serverless Redis   (host 18079 → container 80)
#
# Override locally by exporting KAHANI_PG_PORT etc. before `docker compose up`.
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down
# Wipe data:   docker compose down -v
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       kahaniverse_dev
    ports:
      - "${KAHANI_PG_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    restart: unless-stopped
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/kahaniverse_dev
    ports:
      - "${KAHANI_NEON_PORT:-4455}:4444"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${KAHANI_REDIS_PORT:-56379}:6379"
    volumes:
      - redisdata:/data

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    environment:
      SRH_MODE:              env
      SRH_TOKEN:             local-dev-token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - "${KAHANI_SRH_PORT:-18079}:80"
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
